name: Build and Push Docker Image

# Triggers:
#   - Every push to main (automatic)
#   - Manual "Run workflow" button in the Actions tab (workflow_dispatch)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ── 0. Free up disk space ───────────────────────────────────────────────
      # GitHub Actions runners start with ~14 GB free. A CUDA devel image +
      # PyTorch can approach that limit. This step removes pre-installed tools
      # (Android SDK, .NET, etc.) that you will never use, freeing ~10 GB.
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      # ── 1. Checkout your code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx ─────────────────────────────────────────────
      # Buildx is required for layer caching and multi-platform builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to Docker Hub ─────────────────────────────────────────────
      # Uses secrets you set in: GitHub repo → Settings → Secrets → Actions
      #   DOCKERHUB_USERNAME : your Docker Hub username  (e.g. pranav6773)
      #   DOCKERHUB_TOKEN    : Docker Hub Access Token   (NOT your password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Build and push ───────────────────────────────────────────────────
      # The image is pushed directly to Docker Hub by BuildKit — it never needs
      # to be fully "loaded" locally, so disk space is not a bottleneck.
      #
      # Two tags are pushed on every run:
      #   :latest          — always points to the most recent build
      #   :<git-sha>       — immutable tag for reproducibility / rollback
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64        # H200 / RunPod / Phala are all amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zkllm-smollm2:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zkllm-smollm2:${{ github.sha }}
          # GitHub Actions cache — speeds up rebuilds when only entrypoint.py changes.
          # The CUDA + PyTorch layers (the heavy ones) are cached and reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Print the image digest ───────────────────────────────────────────
      - name: Print image digest
        run: echo "Image pushed successfully"
